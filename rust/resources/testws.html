<html>
	<body>
		<script>
	    const socket = new WebSocket('ws://localhost:9999/abc?ok');

            // When the WebSocket connection is open, send the message "hello world"
	    
            socket.onopen = function() {
                console.log('Connected to WebSocket server');
                socket.send('hello world');
	    	setInterval(function() {
                    socket.send('hello world');
                    console.log('Sent: hello world');
                }, 5000); 
	    }

            // Log any messages received from the server
            socket.onmessage = function(event) {
                console.log('Received from server: ' + event.data);
            };

            // Log any errors that occur with the WebSocket
            socket.onerror = function(error) {
                console.error('WebSocket error: ' + error);
            };

            // Log when the WebSocket connection is closed
            socket.onclose = function() {
                console.log('WebSocket connection closed');
            };
		</script>
	</body>
</html>
