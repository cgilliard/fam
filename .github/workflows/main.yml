name: CI Pipeline
on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - '*'
  schedule:
    - cron: "15 7 * * *" # Nightly build at 7:15 AM (UDT)
  workflow_dispatch:  # This enables manual triggering

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check linux version
        run: uname -a
      - name: linux update nightly
        run: rustup install nightly
      - name: linux build (rustc)
        run: |
          ./scripts/build.sh
      - name: linux build (mrustc)
        run: |
          ./scripts/download_mrust_bin_linux.sh
      - name: linux tests
        run: |
          ./scripts/fasttest.sh
      - name: linux code coverage dependencies
        run: |
          cargo install grcov
          rustup component add llvm-tools-preview
      - name: code coverage
        run: |
          git clone https://anything:${{ secrets.FamPat }}@github.com/cgilliard/fam.git _coverage
          cd _coverage
          git config user.name "Coverage-Bot"
          git config user.email "noreply@pipeline.com"
          git checkout main
          ./scripts/coverage.sh --update-docs
          git commit -am "Coverage-Bot: Updated repo (via main.yml script) Source Version is $GITHUB_SHA";
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            git push https://${{ secrets.FamPat }}@github.com/cgilliard/fam.git
          fi
      - name: linux bootstrap (mrustc)
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          git clone https://github.com/thepowersgang/mrustc
          cd mrustc
          make RUSTCSRC
          make -f minicargo.mk
          cd ..
           ./scripts/mrbuild.sh --mrustc=./mrustc/bin/mrustc --output=./mrustc/output
          fi

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        platform: [macos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check macos version
        run: sw_vers
      - name: macos update nightly
        run: rustup install nightly
      - name: macos build (rustc)
        run: |
          ./scripts/build.sh
      - name: macos build (mrustc)
        run: |
          ./scripts/download_mrust_bin_macos.sh
      - name: macos tests
        run: |
          ./scripts/fasttest.sh
      - name: macos bootstrap (mrustc)
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          git clone https://github.com/thepowersgang/mrustc
            cd mrustc
            make RUSTCSRC
            make -f minicargo.mk
            cd ..
            ./scripts/mrbuild.sh --mrustc=./mrustc/bin/mrustc --output=./mrustc/output
          fi
